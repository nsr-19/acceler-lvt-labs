name: part2-multi-hat
# Part 2 lab (labs/part2-multi-hat) as a Claude Code Action demo.
# The point of the lab is INDEPENDENCE: single-hat reviewers, in separate sessions, that never see
# each other's output. We reproduce that here with two SEPARATE jobs, each invoking one of the repo's
# real .claude/skills slash commands (/hat-security, /hat-blackbox). The disagreement between them is
# the value — contrast with the all-in-one reviewer you run by hand in the lab.
#
# Triggers: auto-review on PRs, plus @claude mentions in PR/issue comments (the action auto-detects
# interactive vs. automation mode). @claude mentions require the Claude GitHub App to be installed
# (https://github.com/apps/claude) and an ANTHROPIC_API_KEY repo secret.
on:
  pull_request:
    types: [opened, synchronize, reopened]
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

# Cancel superseded runs on the same PR/ref to save Actions minutes and API tokens.
concurrency:
  group: part2-multi-hat-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write
  issues: write
  id-token: write

jobs:
  # Security hat — one vantage, deep. Reviews the PR diff ONLY through a security lens by invoking the
  # repo's /hat-security skill. Runs on PR events and on @claude mentions.
  security-hat:
    if: >-
      github.event_name == 'pull_request' ||
      (github.event_name == 'issue_comment' && github.event.issue.pull_request != null) ||
      github.event_name == 'pull_request_review_comment'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      # checkout MUST run before the action so the .claude/ skills, agents and settings are available
      # on the runner and the /hat-security slash skill resolves.
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            REPO: ${{ github.repository }}
            PR NUMBER: ${{ github.event.pull_request.number }}

            Wear exactly one hat: security. Run the project's security-hat skill over the PR diff:

            /hat-security ${{ github.event.pull_request.base.sha }}...${{ github.event.pull_request.head.sha }}

            Then post your ranked findings as a single PR comment. You MUST post exactly one comment by
            running `gh pr comment ${{ github.event.pull_request.number }} --body "<your findings>"`,
            with the single most dangerous issue named first. Do not end your turn until that command
            has succeeded. Only post GitHub comments — do not return the review as a chat message. If you
            find nothing, post a comment saying so plainly; do not invent issues to fill the hat.
          claude_args: |
            --max-turns 30
            --model sonnet
            --allowedTools "Read,Grep,Glob,Bash(git diff:*),Bash(git log:*),Bash(gh pr comment:*),Bash(gh pr diff:*),Bash(gh pr view:*),mcp__github_inline_comment__create_inline_comment"

  # Black-box hat — contract-vs-behavior. Boots the real API, then reviews it against the OpenAPI
  # contract WITHOUT reading the source. This is the hat that catches the clips IDOR from the contract's
  # 404 promise vs. the live cross-org 200 response. Runs on PR events only (needs a booted server); the
  # security-hat job already covers @claude mentions.
  blackbox-hat:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install deps
        run: pnpm install --frozen-lockfile

      # Start the Command Center API in the background and wait for /health before handing off to Claude.
      - name: Start API
        run: |
          make dev-api &
          for i in $(seq 1 30); do
            if curl -fsS http://localhost:8000/health >/dev/null 2>&1; then
              echo "API is up"; exit 0
            fi
            sleep 2
          done
          echo "API failed to start" >&2
          exit 1

      - uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            REPO: ${{ github.repository }}
            PR NUMBER: ${{ github.event.pull_request.number }}

            Wear exactly one hat: black-box. The API is running at http://localhost:8000. Run the
            project's black-box hat against it:

            /hat-blackbox http://localhost:8000

            You may read ONLY contracts/openapi.yaml — never the source. Probe the running API with
            curl using the seed tokens (e.g. `acme-operator-token`, `globex-operator-token`) and report
            where observed behavior contradicts the contract.

            Budget discipline: you have a limited number of turns. Probe the HIGHEST-IMPACT contract
            promises first — cross-org clip access (IDOR), callback SSRF/allowlist, deterrent
            authz/role, and cross-org units/alerts isolation — then STOP probing and post. Do not
            exhaustively test every endpoint or variant; a focused report on the critical findings beats
            an unfinished exhaustive one.

            You MUST actually execute curl against http://localhost:8000 (do not just describe requests),
            and you MUST end by posting exactly one comment via
            `gh pr comment ${{ github.event.pull_request.number }} --body "<your findings>"` well before
            you run out of turns. Do not end your turn until that command has succeeded. Only post
            GitHub comments — do not return the review as a chat message.
          # bypassPermissions is scoped to THIS job only. The project .claude/settings.json marks
          # `Bash(curl:*)` as "ask", which outranks its `Bash(curl http://localhost:*)` allow rule, so
          # in headless CI every probe is denied. --allowedTools below still constrains the hat to
          # read-only contract access + curl + gh, so the blast radius stays tight on the ephemeral
          # runner (localhost target only).
          claude_args: |
            --max-turns 60
            --model sonnet
            --permission-mode bypassPermissions
            --allowedTools "Read(contracts/openapi.yaml),Bash(curl:*),Bash(gh pr comment:*),Bash(gh pr view:*),mcp__github_inline_comment__create_inline_comment"
