name: part3-security
# Part 3 lab (labs/part3-security) as a Claude Code Action demo.
# Shift security left: run the project's OWASP skill and the INDEPENDENT security-reviewer subagent
# over the baseline API on every PR. The lab's headline: a tool flag is a claim, not a proof — the
# owasp-review skill flags the clips IDOR, but no cross-tenant test proves it. The security-reviewer
# job is the second independent witness that names that structural gap.
#
# Triggers: auto-review on PRs touching the vulnerable surface, plus @claude mentions. @claude mentions
# require the Claude GitHub App (https://github.com/apps/claude) and an ANTHROPIC_API_KEY repo secret.
on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - "backend/src/**"
      - "frontend/**"
      - "contracts/openapi.yaml"
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

concurrency:
  group: part3-security-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write
  issues: write
  security-events: write
  id-token: write

jobs:
  # Activity A — the OWASP pass. Invokes the repo's /owasp-review skill over the API and the frontend
  # alert-notes rendering. The skill enforces the structured finding format AND a "reviewed-safe" list,
  # so the allowlisted ORDER BY decoy is called out as safe, not flagged.
  owasp-pass:
    if: >-
      github.event_name == 'pull_request' ||
      (github.event_name == 'issue_comment' && github.event.issue.pull_request != null) ||
      github.event_name == 'pull_request_review_comment'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      # checkout MUST run before the action so the .claude/ skills, agents and settings resolve.
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            REPO: ${{ github.repository }}
            PR NUMBER: ${{ github.event.pull_request.number }}

            Run the project's OWASP review skill over the API handlers in backend/src/api/ and the
            alert-notes rendering in the frontend:

            /owasp-review backend/src/api and the frontend alert-notes rendering

            Use the skill's structured finding format (severity, class, file:line, exploit, fix,
            confidence) and end with an explicit "reviewed-safe" list so any allowlist-guarded
            interpolation (e.g. the units ORDER BY) is deliberately cleared, not flagged. Post the
            report as a single PR comment via `gh pr comment`. Only post GitHub comments.
          claude_args: |
            --max-turns 20
            --model sonnet
            --allowedTools "Read,Grep,Glob,Bash(git diff:*),Bash(git log:*),Bash(gh pr comment:*),Bash(gh pr diff:*),Bash(gh pr view:*),mcp__github_inline_comment__create_inline_comment"

  # Activity B — the independent second witness. Launches the security-reviewer subagent
  # (.claude/agents/security-reviewer.md) to check every resource handler for multi-tenant scoping and
  # to name the real gap: no cross-tenant test exists for the clips IDOR.
  independent-security-reviewer:
    if: >-
      github.event_name == 'pull_request' ||
      (github.event_name == 'issue_comment' && github.event.issue.pull_request != null) ||
      github.event_name == 'pull_request_review_comment'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            REPO: ${{ github.repository }}
            PR NUMBER: ${{ github.event.pull_request.number }}

            Launch the security-reviewer subagent (.claude/agents/security-reviewer.md) as an
            independent second witness. Ask it to:
            - check EVERY resource handler in backend/src/api/ for multi-tenant (org) scoping, comparing
              sibling handlers to surface inconsistencies (the clips IDOR is one such inconsistency);
            - separate confirmed vulnerabilities from reviewed-safe items;
            - explicitly note where a human-authored assertion is missing on a security path — in
              particular, that no cross-tenant test proves the clips IDOR catch.

            Post the subagent's ranked findings plus a one-paragraph go/no-go as a single PR comment via
            `gh pr comment`. Only post GitHub comments.
          claude_args: |
            --max-turns 25
            --model sonnet
            --allowedTools "Task,Read,Grep,Glob,Bash(git diff:*),Bash(git log:*),Bash(gh pr comment:*),Bash(gh pr diff:*),Bash(gh pr view:*),mcp__github_inline_comment__create_inline_comment"
